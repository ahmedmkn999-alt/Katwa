#splash .s-dot{width:7px;height:7px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#ec4899)}

#splash .s-dot:nth-child(2){animation:twinkle 1s ease 1.15s infinite}
#splash .s-dot:nth-child(3){animation:twinkle 1s ease 1.35s infinite}
#splash.hiding{animation:splashOut .45s ease forwards}

.glow-name{animation:glow 2.8s ease-in-out infinite}
.fade-in{animation:fadeIn .35s ease both}
.fade-up{animation:fadeUp .5s ease both}

const h = (tag, props, ...kids) => {
  const el = document.createElement(tag);
  if (props) {
    for (const [k,v] of Object.entries(props)) {
      if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
      else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
      else if (k === 'className') el.className = v;
      else if (k === 'htmlFor') el.htmlFor = v;
      else if (k in el) el[k] = v;
      else el.setAttribute(k, v);
    }
  }
  for (const k of kids.flat(Infinity)) {
    if (k == null || k === false) continue;
    el.appendChild(typeof k === 'string' || typeof k === 'number' ? document.createTextNode(k) : k);
  }
  return el;
};

function svg(tag, attrs, ...kids) {
  const NS = 'http://www.w3.org/2000/svg';
  const el = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs || {})) el.setAttribute(k, v);
  for (const k of kids.flat(Infinity)) {
    if (!k) continue;
    el.appendChild(typeof k === 'string' ? document.createTextNode(k) : k);
  }
  return el;
}

/* simple reactive store */
function createStore(initial) {
  let state = { ...initial };
  const listeners = new Set();
  return {
    get: () => state,
    set(patch) { state = { ...state, ...patch }; listeners.forEach(fn => fn(state)); },
    subscribe(fn) { listeners.add(fn); return () => listeners.delete(fn); },
  };
}

  del(k)       { try { localStorage.removeItem(k); } catch {} },
};

function generateCode(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) { h = (h << 5) - h + name.charCodeAt(i); h |= 0; }
  return (Math.abs(h) % 900000 + 100000).toString();
}

function icon(name, size=18, color="currentColor") {
  const paths = ICONS[name] || '';
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;display:block">${paths}</svg>`;
}

function iconEl(name, size=18, color="currentColor") {
  const div = document.createElement('div');
  div.style.cssText = `display:flex;align-items:center;justify-content:center;flex-shrink:0`;
  div.innerHTML = icon(name, size, color);
  return div;
}

function subjectIconEl(type, color, size=16) {
  const map = { arabic:'book', chemistry:'flask', physics:'atom', biology:'leaf', geo:'target' };
  return iconEl(map[type] || 'target', size, color);
}

/* ── Ticker ── */
function buildTicker() {
  const wrap = h('div', { style:'background:linear-gradient(90deg,#0a0f1e,#1e1b4b,#0a0f1e);border-bottom:1px solid #1e293b;padding:7px 0;overflow:hidden;white-space:nowrap;pointer-events:none' });
  const span = h('span', { style:'display:inline-block;color:#fde68a;font-size:13px;font-weight:700;animation:ticker 24s linear infinite' });
  const update = () => span.textContent = `✦ ${QURAN_VERSES[store.get().verseIdx]} ✦`;
  update();
  store.subscribe(update);
  wrap.appendChild(span);
  return wrap;
}

/* ── Progress bar ── */
function buildProgressBar() {
  const wrap = h('div', { style:'padding:7px 17px;background:#0a0f1e;border-bottom:1px solid #1e293b' });
  const track = h('div', { style:'height:5px;background:#1e293b;border-radius:3px;overflow:hidden;margin-bottom:3px' });
  const fill  = h('div', { style:'height:100%;background:linear-gradient(90deg,#6366f1,#ec4899,#f59e0b);border-radius:3px;transition:width .6s ease;width:0%' });
  const label = h('div', { style:'color:#64748b;font-size:11px' });
  track.appendChild(fill);
  wrap.append(track, label);
  const update = () => {
    const { completed } = store.get();
    const count = Object.values(completed).filter(Boolean).length;
    const pct   = Math.round((count / TOTAL_TASKS) * 100);
    fill.style.width  = pct + '%';
    label.textContent = `${pct}% · ${count}/${TOTAL_TASKS} مهمة مكتملة`;
  };
  update();
  store.subscribe(({ completed }) => { if (completed) update(); });
  return wrap;
}

/* ── Task Row ── */
function buildTaskRow(task, large=false) {
  const { completed } = store.get();
  const done = !!completed[task.id];

  const getDayColor = () => {
    const day = DAYS_DATA.find(d => d.tasks.some(t => t.id === task.id));
    return day ? day.color : '#6366f1';
  };

  const color = getDayColor();

  const row = h('div', {
    style:`display:flex;align-items:center;gap:10px;background:${done ? color+'18' : '#1e293b'};border:1px solid ${done ? color+'55' : '#334155'};border-radius:12px;padding:${large?'13px 14px':'10px 13px'};margin-bottom:8px;transition:all .2s;cursor:default`
  });

  const chkBtn = h('button', {
    style:'background:none;border:none;cursor:pointer;padding:0;flex-shrink:0;display:flex',
    title: done ? 'إلغاء الإنجاز' : 'تحديد كمنجز',
  });
  chkBtn.innerHTML = done
    ? icon('checkCircle', 21, color)
    : icon('circle', 21, '#475569');

  const info = h('div', { style:'flex:1;min-width:0' });
  const title = h('div', { style:`color:${done?'#64748b':'#e2e8f0'};font-weight:600;font-size:${large?14:13}px;text-decoration:${done?'line-through':'none'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap` }, task.title);
  info.append(title);
  if (task.teacher) {
    const tc = h('div', { style:'color:#475569;font-size:11px;margin-top:1px' }, task.teacher);
    info.append(tc);
  }

  const playBtn = h('button', {
    style:`display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:9px;cursor:pointer;background:${color}22;border:1px solid ${color}44;flex-shrink:0`,
    title:'مشاهدة الفيديو',
  });
  playBtn.innerHTML = icon('play', 13, color);

  chkBtn.addEventListener('click', () => {
    const comp = store.get().completed;
    const next = { ...comp, [task.id]: !comp[task.id] };
    store.set({ completed: next });
    LS.set('katwa_completed', next);
  });

  playBtn.addEventListener('click', () => store.set({ videoModal: task }));

  row.append(chkBtn, info, playBtn);

  // re-render on toggle
  store.subscribe(({ completed: c }) => {
    if (!c) return;
    const d = !!c[task.id];
    chkBtn.innerHTML = d ? icon('checkCircle', 21, color) : icon('circle', 21, '#475569');
    row.style.background   = d ? color+'18' : '#1e293b';
    row.style.borderColor  = d ? color+'55' : '#334155';
    title.style.color      = d ? '#64748b' : '#e2e8f0';
    title.style.textDecoration = d ? 'line-through' : 'none';
  });

  return row;
}

/* ── Video Modal ── */
function buildVideoModal() {
  const overlay = h('div', {
    style:'position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:1000;display:none;align-items:center;justify-content:center;padding:14px;animation:appear .2s ease'
  });
  const modal = h('div', {
    style:'background:#0a0f1e;border:1px solid #334155;border-radius:18px;width:100%;max-width:860px;overflow:hidden;box-shadow:0 0 80px rgba(99,102,241,.3)'
  });
  const top = h('div', {
    style:'display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid #1e293b;background:#0f172a'
  });
  const titleEl = h('span', { style:'color:#f1f5f9;font-weight:700;font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap' });
  const closeBtn = h('button', { style:'background:none;border:none;cursor:pointer;padding:6px;display:flex;flex-shrink:0;border-radius:8px' });
  closeBtn.innerHTML = icon('x', 19, '#e2e8f0');
  top.append(titleEl, closeBtn);

  const iframeWrap = h('div', { style:'position:relative;padding-bottom:56.25%;height:0' });
  const iframe = h('iframe', {
    style:'position:absolute;inset:0;width:100%;height:100%;border:none',
    allowFullscreen: true,
    allow:'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture',
  });
  iframeWrap.appendChild(iframe);
  modal.append(top, iframeWrap);
  overlay.appendChild(modal);

  const close = () => { store.set({ videoModal: null }); iframe.src = ''; overlay.style.display = 'none'; };
  closeBtn.addEventListener('click', close);
  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });

  store.subscribe(({ videoModal: vm }) => {
    if (vm) {
      titleEl.textContent = `${vm.title} — ${vm.teacher || ''}`;
      iframe.src = `https://www.youtube.com/embed/${vm.videoId}?autoplay=1&rel=0`;
      overlay.style.display = 'flex';
    }
  });

  return overlay;
}

/* ── Schedule View: Personal Daily Planner ── */
function buildScheduleView() {
  const STORAGE_KEY = 'katwa_planner';

  // Block types config
  const BLOCK_TYPES = [
    { id:'study',  label:'مذاكرة',  color:'#6366f1', bg:'rgba(99,102,241,.15)',  border:'rgba(99,102,241,.35)', emoji:'📚' },
    { id:'break',  label:'راحة',    color:'#10b981', bg:'rgba(16,185,129,.12)',  border:'rgba(16,185,129,.3)',  emoji:'☕' },
    { id:'prayer', label:'صلاة',    color:'#f59e0b', bg:'rgba(245,158,11,.12)',  border:'rgba(245,158,11,.3)',  emoji:'🕌' },
    { id:'eat',    label:'أكل',     color:'#ec4899', bg:'rgba(236,72,153,.12)',  border:'rgba(236,72,153,.3)',  emoji:'🍽️' },
    { id:'other',  label:'أخرى',    color:'#94a3b8', bg:'rgba(148,163,184,.1)',  border:'rgba(148,163,184,.25)',emoji:'📌' },
  ];

  // Load saved blocks
  let blocks = LS.get(STORAGE_KEY, []);
  // { id, type, label, mins }

  const wrap = h('div', { className:'fade-in' });

  // ── Header
  const hdr = h('div', { style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:16px' });
  const hdrLeft = h('div', {});
  const hdrTitle = h('h3', { style:'color:#f1f5f9;font-weight:900;font-size:18px' }, 'جدولي اليومي 📅');
  const hdrSub   = h('p',  { style:'color:#64748b;font-size:12px;margin-top:3px' }, 'البداية 12:00 ظهراً — يتحفظ تلقائياً');
  hdrLeft.append(hdrTitle, hdrSub);

  const clearBtn = h('button', {
    style:'display:flex;align-items:center;gap:5px;background:#1e293b;border:1px solid #334155;border-radius:9px;padding:7px 12px;color:#ef4444;font-size:12px;font-family:Cairo,sans-serif;cursor:pointer;font-weight:700'
  }, 'مسح الكل');
  clearBtn.addEventListener('click', () => {
    if (!confirm('هتمسح الجدول كله؟')) return;
    blocks = [];
    LS.set(STORAGE_KEY, blocks);
    renderBlocks();
  });
  hdr.append(hdrLeft, clearBtn);
  wrap.appendChild(hdr);

  // ── Timeline display
  const timeline = h('div', { style:'margin-bottom:18px' });
  wrap.appendChild(timeline);

  // ── Add block section
  const addCard = h('div', { style:'background:#1e293b;border:1px solid #334155;border-radius:16px;padding:16px;margin-bottom:16px' });
  const addTitle = h('div', { style:'color:#f1f5f9;font-weight:800;font-size:14px;margin-bottom:12px' }, '+ أضف بلوك');

  // Type selector
  const typeRow = h('div', { style:'display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px' });
  let selectedType = BLOCK_TYPES[0];
  const typeBtns = {};
  BLOCK_TYPES.forEach(t => {
    const btn = h('button', {
      style:`display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:10px;border:1px solid ${t.border};background:${t.bg};color:${t.color};font-size:13px;font-family:Cairo,sans-serif;font-weight:700;cursor:pointer;transition:all .15s`
    }, `${t.emoji} ${t.label}`);
    btn.addEventListener('click', () => {
      selectedType = t;
      Object.entries(typeBtns).forEach(([id, b]) => {
        const tt = BLOCK_TYPES.find(x => x.id === id);
        b.style.opacity = id === t.id ? '1' : '0.45';
        b.style.transform = id === t.id ? 'scale(1.05)' : 'scale(1)';
      });
      // update label placeholder
      if (t.id === 'study') labelInput.placeholder = 'مثال: مراجعة عربي';
      else if (t.id === 'break') labelInput.placeholder = 'مثال: استراحة';
      else if (t.id === 'prayer') labelInput.placeholder = 'مثال: صلاة الظهر';
      else if (t.id === 'eat')   labelInput.placeholder = 'مثال: غداء';
      else labelInput.placeholder = 'اكتب وصف البلوك...';
    });
    typeBtns[t.id] = btn;
    typeRow.appendChild(btn);
  });
  // init selected
  typeBtns[selectedType.id].style.opacity = '1';
  Object.keys(typeBtns).filter(k => k !== selectedType.id).forEach(k => typeBtns[k].style.opacity = '0.45');

  // Label input
  const labelInput = h('input', {
    style:'width:100%;background:#0a0f1e;border:1px solid #334155;border-radius:10px;padding:10px 13px;color:#f1f5f9;font-size:14px;font-family:Cairo,sans-serif;outline:none;margin-bottom:10px',
    placeholder:'مثال: مراجعة عربي',
    type:'text',
  });

  // Duration row
  const durRow = h('div', { style:'display:flex;align-items:center;gap:10px;margin-bottom:12px' });
  const durLabel = h('span', { style:'color:#94a3b8;font-size:13px;flex-shrink:0' }, '⏱️ المدة:');
  const durBtns  = h('div', { style:'display:flex;gap:6px;flex-wrap:wrap' });
  let selectedMins = 30;
  const durOptions = [15, 30, 45, 60, 90, 120];
  const durBtnEls = {};
  durOptions.forEach(m => {
    const btn = h('button', {
      style:`padding:6px 12px;border-radius:8px;border:1px solid #334155;background:#0a0f1e;color:#94a3b8;font-size:12px;font-family:Cairo,sans-serif;cursor:pointer;transition:all .15s`
    }, m >= 60 ? `${m/60}س` : `${m}د`);
    btn.addEventListener('click', () => {
      selectedMins = m;
      Object.entries(durBtnEls).forEach(([mm, b]) => {
        const active = parseInt(mm) === m;
        b.style.background   = active ? '#6366f1' : '#0a0f1e';
        b.style.borderColor  = active ? '#6366f1' : '#334155';
        b.style.color        = active ? 'white'   : '#94a3b8';
      });
    });
    durBtnEls[m] = btn;
    durBtns.appendChild(btn);
  });
  durBtnEls[30].click(); // default
  durRow.append(durLabel, durBtns);

  // Add button
  const addBtn = h('button', {
    style:'width:100%;background:linear-gradient(135deg,#6366f1,#ec4899);border:none;border-radius:11px;padding:12px;color:white;font-weight:800;font-size:15px;font-family:Cairo,sans-serif;cursor:pointer'
  }, 'إضافة ✓');

  addBtn.addEventListener('click', () => {
    const lbl = labelInput.value.trim() || selectedType.label;
    blocks.push({ id: Date.now(), type: selectedType.id, label: lbl, mins: selectedMins });
    LS.set(STORAGE_KEY, blocks);
    labelInput.value = '';
    renderBlocks();
  });

  addCard.append(addTitle, typeRow, labelInput, durRow, addBtn);
  wrap.append(addCard);

  // ── Render timeline blocks
  function minsToTime(totalMins) {
    const base = 12 * 60; // 12:00 PM
    const t = base + totalMins;
    const h = Math.floor(t / 60) % 24;
    const m = t % 60;
    const ampm = h < 12 ? 'ص' : h < 24 ? 'م' : 'ص';
    const h12  = h === 0 ? 12 : h > 12 ? h - 12 : h;
    return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
  }

  function renderBlocks() {
    timeline.innerHTML = '';
    if (blocks.length === 0) {
      const empty = h('div', {
        style:'text-align:center;padding:40px 20px;color:#475569;font-size:14px;background:#1e293b22;border:1px dashed #334155;border-radius:14px'
      }, '📋 ابدأ بإضافة بلوكات لجدولك اليومي');
      timeline.appendChild(empty);
      return;
    }

    // Summary bar
    const totalMins = blocks.reduce((s,b) => s+b.mins, 0);
    const studyMins = blocks.filter(b=>b.type==='study').reduce((s,b)=>s+b.mins,0);
    const endTime   = minsToTime(totalMins);
    const summaryBar = h('div', {
      style:'display:flex;justify-content:space-between;align-items:center;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.25);border-radius:12px;padding:10px 14px;margin-bottom:14px'
    });
    summaryBar.append(
      h('span', { style:'color:#a5b4fc;font-size:13px;font-weight:700' }, `🕐 ينتهي ${endTime}`),
      h('span', { style:'color:#94a3b8;font-size:12px' }, `مذاكرة: ${Math.floor(studyMins/60)}س ${studyMins%60}د`),
    );
    timeline.appendChild(summaryBar);

    // Blocks
    let elapsed = 0;
    blocks.forEach((blk, idx) => {
      const t = BLOCK_TYPES.find(x => x.id === blk.type) || BLOCK_TYPES[4];
      const startTime = minsToTime(elapsed);
      const endT      = minsToTime(elapsed + blk.mins);

      const card = h('div', {
        style:`display:flex;align-items:stretch;gap:0;margin-bottom:6px;border-radius:13px;overflow:hidden;border:1px solid ${t.border}`
      });

      // Left color bar
      const colorBar = h('div', { style:`width:5px;background:${t.color};flex-shrink:0` });

      // Content
      const content = h('div', {
        style:`flex:1;display:flex;align-items:center;justify-content:space-between;padding:11px 13px;background:${t.bg}`
      });

      const left = h('div', { style:'display:flex;flex-direction:column;gap:2px' });
      const topLine = h('div', { style:'display:flex;align-items:center;gap:7px' });
      const emojiEl = h('span', { style:'font-size:16px;line-height:1' }, t.emoji);
      const lblEl   = h('span', { style:`color:#f1f5f9;font-weight:800;font-size:14px` }, blk.label);
      topLine.append(emojiEl, lblEl);
      const timeEl = h('div', { style:'color:#64748b;font-size:11px;direction:ltr;text-align:right' }, `${startTime} ← ${endT}`);
      left.append(topLine, timeEl);

      // Right: duration + delete
      const right = h('div', { style:'display:flex;align-items:center;gap:8px;flex-shrink:0' });
      const durEl  = h('div', { style:`background:${t.color}22;border:1px solid ${t.border};border-radius:7px;padding:3px 9px;color:${t.color};font-size:12px;font-weight:800` },
        blk.mins >= 60 ? `${blk.mins/60}س` : `${blk.mins}د`
      );

      // Move up/down
      const upBtn = h('button', { style:'background:none;border:none;cursor:pointer;padding:3px;color:#475569;font-size:14px', title:'لأعلى' }, '↑');
      const dnBtn = h('button', { style:'background:none;border:none;cursor:pointer;padding:3px;color:#475569;font-size:14px', title:'لأسفل' }, '↓');
      const delBtn= h('button', { style:'background:none;border:none;cursor:pointer;padding:3px;font-size:14px', title:'حذف' });
      delBtn.innerHTML = icon('x', 14, '#ef4444');

      upBtn.addEventListener('click', () => {
        if (idx === 0) return;
        [blocks[idx-1], blocks[idx]] = [blocks[idx], blocks[idx-1]];
        LS.set(STORAGE_KEY, blocks); renderBlocks();
      });
      dnBtn.addEventListener('click', () => {
        if (idx === blocks.length-1) return;
        [blocks[idx+1], blocks[idx]] = [blocks[idx], blocks[idx+1]];
        LS.set(STORAGE_KEY, blocks); renderBlocks();
      });
      delBtn.addEventListener('click', () => {
        blocks.splice(idx, 1);
        LS.set(STORAGE_KEY, blocks); renderBlocks();
      });

      right.append(durEl, upBtn, dnBtn, delBtn);
      content.append(left, right);
      card.append(colorBar, content);
      timeline.appendChild(card);

      elapsed += blk.mins;
    });
  }

  renderBlocks();
  return wrap;
}

  }, String(day.day));

  left.append(numBadge, infoCol);

  const right = h('div', { style:'display:flex;align-items:center;gap:8px;flex-shrink:0' });
  const pctLabel = h('span', { style:`color:${day.color};font-weight:900;font-size:14px` });
  const chevIcon = h('div', { style:'display:flex' });
  chevIcon.innerHTML = icon('chevDown', 15, '#64748b');
  right.append(pctLabel, chevIcon);

  header.append(left, right);

  const progressBar = h('div', { style:'height:3px;background:#1e293b;overflow:hidden;border-radius:0 0 3px 3px' });
  const progressFill = h('div', { style:`height:100%;background:${day.color};transition:width .4s;width:0%` });
  progressBar.appendChild(progressFill);

    style:`display:none;background:rgba(10,15,30,.7);border:1px solid #334155;border-top:none;border-radius:0 0 11px 11px;padding:10px`
  });
  day.tasks.forEach(t => tasksContainer.appendChild(buildTaskRow(t)));

  outer.append(header, progressBar, tasksContainer);

  let open = false;
  const refresh = () => {
    const { completed } = store.get();
    const done = day.tasks.filter(t => completed[t.id]).length;
    const pct  = Math.round((done / day.tasks.length) * 100);
    subLabel.textContent = `${done}/${day.tasks.length} مهام`;
    pctLabel.textContent = `${pct}%`;
    progressFill.style.width = pct + '%';
  };
  refresh();
  store.subscribe(({ completed: c }) => { if (c) refresh(); });

  header.addEventListener('click', () => {
    open = !open;
    tasksContainer.style.display = open ? 'block' : 'none';
    chevIcon.innerHTML = icon(open ? 'chevUp' : 'chevDown', 15, '#64748b');
    header.style.borderRadius = open ? '11px 11px 0 0' : '11px';
  });

  return outer;
}

/* ── Today View (navigable) ── */
function buildTodayView(defaultDayData) {
  const wrap = h('div', { className:'fade-in' });

  // current displayed day number
  let currentDayNum = defaultDayData.day;

  // ── Day navigator bar
  const navBar = h('div', { style:'display:flex;align-items:center;justify-content:space-between;background:#1e293b;border:1px solid #334155;border-radius:14px;padding:10px 14px;margin-bottom:14px' });

  const prevBtn = h('button', {
    style:'display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:10px;background:#0a0f1e;border:1px solid #334155;cursor:pointer;flex-shrink:0'
  });
  prevBtn.innerHTML = icon('chevDown', 18, '#94a3b8'); // reuse chevDown as left arrow via rotate
  prevBtn.style.transform = 'rotate(90deg)';

  const nextBtn = h('button', {
    style:'display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:10px;background:#0a0f1e;border:1px solid #334155;cursor:pointer;flex-shrink:0'
  });
  nextBtn.innerHTML = icon('chevDown', 18, '#94a3b8');
  nextBtn.style.transform = 'rotate(-90deg)';

  const dayLabel = h('div', { style:'text-align:center;flex:1' });
  const dayNumEl = h('div', { style:'color:#f1f5f9;font-weight:900;font-size:16px' });
  const daySubEl = h('div', { style:'color:#64748b;font-size:12px;margin-top:2px' });
  const todayBadge = h('div', {
    style:'display:inline-block;background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.35);border-radius:6px;padding:1px 8px;color:#f59e0b;font-size:11px;font-weight:700;margin-top:3px'
  }, '← اليوم');
  dayLabel.append(dayNumEl, daySubEl, todayBadge);
  navBar.append(nextBtn, dayLabel, prevBtn);
  wrap.appendChild(navBar);

  // ── Content area (re-renders on day change)
  const content = h('div', {});
  wrap.appendChild(content);

  function renderDay(dayNum) {
    currentDayNum = dayNum;
    const dayData = DAYS_DATA.find(d => d.day === dayNum) || DAYS_DATA[0];
    const isToday = dayNum === defaultDayData.day;

    // Update nav bar
    dayNumEl.textContent = `اليوم ${dayNum} من 19`;
    daySubEl.textContent = dayData.subject;
    daySubEl.style.color = dayData.color;
    todayBadge.style.display = isToday ? 'inline-block' : 'none';
    prevBtn.style.opacity = dayNum <= 1  ? '0.3' : '1';
    nextBtn.style.opacity = dayNum >= 19 ? '0.3' : '1';

    // Clear & rebuild content
    content.innerHTML = '';

    // Past day warning
    if (!isToday && dayNum < defaultDayData.day) {
      const pastBadge = h('div', {
        style:'display:flex;align-items:center;gap:7px;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.25);border-radius:10px;padding:9px 13px;margin-bottom:12px;color:#a5b4fc;font-size:13px'
      });
      pastBadge.append(iconEl('alert', 14, '#a5b4fc'), 'يوم سابق — تقدر تكمل مهامه هنا');
      content.appendChild(pastBadge);
    } else if (!isToday && dayNum > defaultDayData.day) {
      const futureBadge = h('div', {
        style:'display:flex;align-items:center;gap:7px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:10px;padding:9px 13px;margin-bottom:12px;color:#f59e0b;font-size:13px'
      });
      futureBadge.append(iconEl('star', 14, '#f59e0b'), 'يوم قادم — شوف مهامه ووسّع مداركك 🚀');
      content.appendChild(futureBadge);
    }

    // Header
    const hdr = h('div', { style:'display:flex;align-items:center;gap:10px;margin-bottom:14px' });
    hdr.append(subjectIconEl(dayData.icon, dayData.color, 22));
    const hTxt   = h('div', {});
    const hTitle = h('h3', { style:'color:#f1f5f9;font-weight:900;font-size:18px' }, isToday ? 'نشاطي اليوم' : `مهام اليوم ${dayNum}`);
    const hSub   = h('p',  { style:`color:${dayData.color};font-size:13px;margin-top:2px` }, dayData.subject);
    hTxt.append(hTitle, hSub);
    hdr.append(hTxt);
    content.appendChild(hdr);

    // Progress card
    const progCard = h('div', { style:'background:#1e293b;border:1px solid #334155;border-radius:13px;padding:13px;margin-bottom:14px' });
    const progRow  = h('div', { style:'display:flex;justify-content:space-between;margin-bottom:7px' });
    const progLbl  = h('span', { style:'color:#94a3b8;font-size:13px' }, 'التقدم');
    const progVal  = h('span', { style:`color:${dayData.color};font-weight:800` });
    progRow.append(progLbl, progVal);
    const barWrap  = h('div', { style:'height:8px;background:#0a0f1e;border-radius:4px;overflow:hidden' });
    const barFill  = h('div', { style:`height:100%;background:${dayData.color};border-radius:4px;transition:width .5s;width:0%` });
    barWrap.appendChild(barFill);
    progCard.append(progRow, barWrap);
    content.appendChild(progCard);

    // Tasks
    const taskList = h('div', {});
    dayData.tasks.forEach(t => taskList.appendChild(buildTaskRow(t, true)));
    content.appendChild(taskList);

    // Celebration
    const celebration = h('div', {
      style:'display:none;text-align:center;padding:34px 18px;background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.28);border-radius:18px;margin-top:18px;flex-direction:column;align-items:center'
    });
    celebration.innerHTML = `<div style="display:flex;justify-content:center">${icon('trophy', 42, '#f59e0b')}</div>`;
    celebration.append(
      h('h3', { style:'color:#f59e0b;font-weight:900;font-size:21px;margin-top:12px' }, 'أنهيت كل مهام اليوم! 🎉'),
      h('p',  { style:'color:#94a3b8;margin-top:8px' }, 'رائع جداً، استمر في تحقيق الحلم ✨')
    );
    content.appendChild(celebration);

    // Refresh fn
    const refresh = () => {
      const { completed } = store.get();
      const done  = dayData.tasks.filter(t => completed[t.id]).length;
      const total = dayData.tasks.length;
      progVal.textContent = `${done}/${total}`;
      barFill.style.width = Math.round((done / total) * 100) + '%';
      celebration.style.display = done === total ? 'flex' : 'none';
    };
    refresh();

    // Subscribe — store unsub when day changes
    const unsub = store.subscribe(({ completed: c }) => { if (c) refresh(); });
    // Save unsub so next renderDay can clean up
    wrap._unsub && wrap._unsub();
    wrap._unsub = unsub;
  }

  prevBtn.addEventListener('click', () => { if (currentDayNum > 1)  renderDay(currentDayNum - 1); });
  nextBtn.addEventListener('click', () => { if (currentDayNum < 19) renderDay(currentDayNum + 1); });

  renderDay(defaultDayData.day);
  return wrap;
}

    heroName.textContent  = `${studentName} 🏆`;

      sCnt.textContent      = `${done}/${tasks.length}`;

  refresh();
  store.subscribe(s => { if (s.completed || s.studentName) refresh(); });

/* ── Main Nav Tabs ── */
function buildNav() {
  const nav = h('nav', { style:'display:flex;gap:4px;padding:9px 13px;background:#0a0f1e;border-bottom:1px solid #1e293b;overflow-x:auto' });
  const tabs = [
    {id:'dashboard',label:'الرئيسية',icon:'bar'},
    {id:'schedule', label:'الجدول',   icon:'calendar'},
    {id:'today',    label:'نشاطي اليوم',icon:'target'},
  ];
  const btnEls = {};
  for (const t of tabs) {
    const btn = h('button', {
      style:`display:flex;align-items:center;gap:6px;padding:7px 13px;background:#1e293b;border:1px solid #334155;border-radius:10px;color:#94a3b8;cursor:pointer;font-size:13px;font-family:'Cairo',sans-serif;font-weight:600;white-space:nowrap;transition:all .2s`,
    });
    btn.innerHTML = icon(t.icon, 15, '#94a3b8');
    btn.append(document.createTextNode(t.label));
    btn.addEventListener('click', () => store.set({ activeTab: t.id }));
    btnEls[t.id] = btn;
    nav.appendChild(btn);
  }

  store.subscribe(({ activeTab }) => {
    if (!activeTab) return;
    for (const [id, btn] of Object.entries(btnEls)) {
      const active = id === activeTab;
      btn.style.background = active ? 'linear-gradient(135deg,#6366f1,#ec4899)' : '#1e293b';
      btn.style.border     = active ? '1px solid transparent' : '1px solid #334155';
      btn.style.color      = active ? 'white' : '#94a3b8';
    }
  });

  return nav;
}

  txt.append(platName, heroLine);

  codePill.append(iconEl('lock', 11, '#6366f1'));

  codePill.appendChild(codeSpan);

  logoutBtn.innerHTML = icon('logout', 17, '#64748b');
  logoutBtn.addEventListener('click', onLogout);
  right.append(codePill, logoutBtn);

  store.subscribe(({ studentName, studentCode }) => {

  const { studentName, studentCode } = store.get();

/* ── Main App Screen ── */
function buildApp() {
  const root = h('div', { style:'min-height:100vh;background:#0a0f1e;font-family:Cairo,sans-serif;direction:rtl;padding-bottom:50px' });

  const START = new Date('2025-05-07T00:00:00');
  const now   = new Date();
  const diff  = Math.floor((now - START) / (1000*60*60*24));
  const todayDayNum = diff < 0 ? 1 : diff >= 19 ? 19 : diff + 1;
  const todayData   = DAYS_DATA.find(d => d.day === todayDayNum) || DAYS_DATA[0];

  const onLogout = () => {
    LS.del('katwa_code');
    store.set({ screen:'login', studentCode:'', studentName:'', activeTab:'dashboard' });
  };

  root.append(
    buildTicker(),
    buildHeader(onLogout),
    buildProgressBar(),
    buildNav(),
  );

  const main = h('div', { style:'padding:13px' });
  root.appendChild(main);

  let currentTab = null;
  let viewCache = {};

  const renderTab = (tab) => {
    if (tab === currentTab) return;
    currentTab = tab;
    main.innerHTML = '';

    if (!viewCache[tab]) {
      if (tab === 'dashboard') viewCache[tab] = buildDashboardView(todayData);
      if (tab === 'schedule')  viewCache[tab] = buildScheduleView();
      if (tab === 'today')     viewCache[tab] = buildTodayView(todayData);
    }
    main.appendChild(viewCache[tab]);
  };

  store.subscribe(({ activeTab }) => { if (activeTab) renderTab(activeTab); });
  renderTab(store.get().activeTab || 'dashboard');

  root.appendChild(buildVideoModal());
  return root;
}

  // Top
  const top = h('div', { style:'text-align:center;margin-bottom:26px' });
  const ring = h('div', { style:'display:flex;justify-content:center;margin-bottom:14px' });
  const ringInner = h('div', { style:'width:88px;height:88px;border-radius:50%;background:linear-gradient(135deg,rgba(99,102,241,.18),rgba(236,72,153,.18));border:1px solid rgba(99,102,241,.3);display:flex;align-items:center;justify-content:center' });
  ringInner.appendChild(logoEl(62));
  ring.appendChild(ringInner);

  verse.appendChild(h('span', { style:'color:#a5b4fc;font-size:14px;font-weight:600;line-height:1.9' }, '❝ وَأَن لَّيْسَ لِلْإِنسَانِ إِلَّا مَا سَعَىٰ ❞'));

  // Label
  const label = h('div', { style:'display:flex;align-items:center;gap:7px;color:#94a3b8;font-size:13px;margin-bottom:10px' });
  label.append(iconEl('key', 14, '#6366f1'), 'أدخل كودك السري (6 أرقام)');

  // Code boxes
  let codeVal = '';
  const boxesWrap = h('div', { style:'position:relative;display:flex;justify-content:center;gap:8px;margin-bottom:6px' });
  const boxes = Array.from({length:6}, () => {
    const b = h('div', { style:'width:42px;height:52px;background:#1e293b;border:1px solid #334155;border-radius:11px;display:flex;align-items:center;justify-content:center;color:#f1f5f9;font-weight:900;font-size:22px;transition:all .2s' });
    boxesWrap.appendChild(b);
    return b;
  });
  const hiddenInput = h('input', { style:'position:absolute;opacity:0;width:100%;height:60px;left:0;cursor:pointer;font-size:1px;top:0', type:'text', inputMode:'numeric', maxLength:'6', autocomplete:'off' });
  boxesWrap.appendChild(hiddenInput);

  const updateBoxes = (val) => {
    codeVal = val.replace(/\D/g,'').slice(0,6);
    hiddenInput.value = codeVal;
    boxes.forEach((b, i) => {
      b.textContent = codeVal[i] || '';
      b.style.background   = codeVal[i] ? 'rgba(99,102,241,.2)' : '#1e293b';
      b.style.borderColor  = codeVal[i] ? '#6366f1' : '#334155';
      b.style.color        = codeVal[i] ? '#a5b4fc' : '#f1f5f9';
    });
    loginBtn.style.opacity = codeVal.length === 6 ? '1' : '0.45';
    loginBtn.disabled      = codeVal.length !== 6;
  };

  hiddenInput.addEventListener('input', e => updateBoxes(e.target.value));
  boxesWrap.addEventListener('click', () => hiddenInput.focus());

  const errMsg = h('div', { style:'display:none;align-items:center;gap:5px;color:#ef4444;font-size:12px;margin-top:6px;justify-content:center' });
  errMsg.append(iconEl('alert', 13, '#ef4444'), 'الكود غير صحيح — تواصل مع المسؤول');

  const loginBtn = h('button', {
    style:'width:100%;background:linear-gradient(135deg,#6366f1,#ec4899);border:none;border-radius:12px;padding:13px;color:white;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:Cairo,sans-serif;margin-top:16px;transition:opacity .2s;opacity:.45',
    disabled: true,
  });
  loginBtn.innerHTML = icon('zap', 17, 'white');
  loginBtn.append('دخول');

  const tryLogin = () => {
    const code = codeVal.trim();
    if (code === ADMIN_CODE) {
      LS.set('katwa_code', code);
      store.set({ screen:'admin' });
    } else if (STUDENTS[code]) {
      LS.set('katwa_code', code);
      store.set({ screen:'app', studentCode:code, studentName:STUDENTS[code] });
    } else {
      errMsg.style.display = 'flex';
      card.style.animation = 'shake .4s ease';
      setTimeout(() => { card.style.animation = ''; }, 450);
    }
  };

  loginBtn.addEventListener('click', tryLogin);
  hiddenInput.addEventListener('keydown', e => e.key === 'Enter' && codeVal.length === 6 && tryLogin());

  const hint = h('p', { style:'text-align:center;color:#475569;font-size:12px;margin-top:14px' }, 'لا تملك كوداً؟ تواصل مع الأستاذ المسؤول');
  card.append(top, verse, label, boxesWrap, errMsg, loginBtn, hint);
  bg.appendChild(card);

  setTimeout(() => hiddenInput.focus(), 300);

  return bg;
}

/* ══════════════════════════════════════
   ROOT RENDERER
══════════════════════════════════════ */
const rootEl = document.getElementById('root');
let currentScreen = null;
let currentEl = null;

store.subscribe(({ screen }) => {
  if (!screen || screen === currentScreen) return;
  currentScreen = screen;
  if (currentEl) { rootEl.removeChild(currentEl); currentEl = null; }

  if (screen === 'login') currentEl = buildLogin();
  else if (screen === 'app')   currentEl = buildApp();
  else if (screen === 'admin') currentEl = buildAdminPanel();

  if (currentEl) rootEl.appendChild(currentEl);
});

// Initial render
const { screen } = store.get();
