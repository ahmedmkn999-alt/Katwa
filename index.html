<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية SUPER MISS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Cairo', sans-serif; }
        body { background-color: #f3f4f6; overflow-x: hidden; }
        
        /* حركة الطيران للصورة */
        .hero-fly {
            background-image: url('https://i.postimg.cc/1RkTjFzN/1778213993401.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            animation: flyAnimation 5s ease-in-out infinite;
        }
        @keyframes flyAnimation {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

        /* تصميم القائمة الجانبية */
        #sidebar {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(100%);
        }
        #sidebar.active { transform: translateX(0); }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #e5e7eb;
            transition: all 0.3s ease;
        }
        .glass-card:hover { transform: translateY(-10px); box-shadow: 0 20px 30px -10px rgba(59, 130, 246, 0.2); }

        /* أيقونة الملف العائمة */
        .fab-button {
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body class="text-gray-900">

    <nav class="bg-white sticky top-0 z-50 px-4 py-3 flex items-center justify-between shadow-md">
        <div class="flex items-center gap-4">
            <div class="flex items-center bg-sky-400 rounded-full p-1 cursor-pointer">
                <div class="bg-white rounded-full p-1.5 text-sky-500 shadow-sm">
                    <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/></svg>
                </div>
                <div class="px-2 text-white">
                    <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
                </div>
            </div>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-gray-600"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </div>

        <div class="text-2xl font-black text-blue-700 tracking-tighter">SUPER MISS</div>

        <div class="flex items-center gap-3">
            <div class="bg-slate-800 text-white px-4 py-1.5 rounded-full flex items-center gap-2">
                <span class="text-sm font-bold">0 جنيه</span>
                <div class="w-6 h-4 bg-gray-500 rounded-sm relative">
                    <div class="absolute right-1 top-1 w-2 h-1 bg-white opacity-20"></div>
                </div>
            </div>
            <div class="text-gray-600 relative">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            </div>
            <div class="w-10 h-10 rounded-full border-2 border-white shadow-sm overflow-hidden">
                <img src="https://ui-avatars.com/api/?name=User&background=0284c7&color=fff" alt="User">
            </div>
        </div>
    </nav>

    <header class="relative h-[450px] flex items-center justify-center bg-white">
        <div class="hero-fly absolute inset-0 z-0"></div>
        <div class="relative z-10 text-center">
            <h1 class="text-5xl md:text-7xl font-black text-gray-900 mb-4">تصفح الكورسات</h1>
            <div class="inline-block bg-blue-600 text-white px-10 py-2.5 rounded-full font-bold text-lg">
                أكاديمية السوبر في اللغة العربية
            </div>
        </div>
    </header>

    <section class="max-w-7xl mx-auto px-4 py-16 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <script>
            const courses = ["الشهر الأول", "الشهر الثاني", "الشهر الثالث", "الشهر الرابع", "الشهر الخامس", "الشهر السادس", "الشهر السابع", "الشهر الثامن", "المراجعة النهائية"];
            courses.forEach((name, i) => {
                document.write(`
                    <div class="glass-card rounded-[2rem] overflow-hidden group bg-white">
                        <div class="h-52 bg-gray-100 relative overflow-hidden">
                            <img src="https://i.postimg.cc/1RkTjFzN/1778213993401.png" class="absolute w-full h-full object-cover opacity-10">
                            <div class="absolute inset-0 flex items-center justify-center">
                                <div class="w-24 h-24 bg-white rounded-3xl shadow-xl flex items-center justify-center transform group-hover:rotate-12 transition">
                                    <span class="text-blue-600 font-black text-2xl">SM</span>
                                </div>
                            </div>
                            <div class="absolute top-4 left-4 bg-white/90 px-3 py-1 rounded-xl font-black text-blue-600 border border-blue-50 shadow-sm">100 ج.م</div>
                        </div>
                        <div class="p-6">
                            <h3 class="text-xl font-black text-gray-800 mb-2">${name}</h3>
                            <p class="text-gray-500 text-sm mb-6 leading-relaxed">استعد للقمة مع أقوى شرح ومتابعة حصرية لحظة بلحظة.</p>
                            <button class="w-full bg-blue-600 py-3.5 rounded-2xl text-white font-black hover:bg-blue-700 shadow-lg shadow-blue-100 transition-all">اشتراك الآن</button>
                        </div>
                    </div>
                `);
            });
        </script>
    </section>

    <div onclick="toggleSidebar()" class="fixed bottom-24 right-6 w-14 h-14 bg-blue-600 rounded-full flex items-center justify-center text-white fab-button cursor-pointer z-[60]">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
    </div>

    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-[70] hidden"></div>
    <div id="sidebar" class="fixed top-0 right-0 h-full w-[300px] bg-white z-[80] shadow-2xl p-6 overflow-y-auto">
        <div class="text-center mb-8">
            <div class="w-20 h-20 rounded-full bg-blue-50 mx-auto mb-4 border-2 border-blue-100 overflow-hidden">
                <img src="https://ui-avatars.com/api/?name=Ahmed+Mohamed&background=random" alt="Avatar">
            </div>
            <h4 class="font-black text-gray-800">أهلاً، أحمد محمد السيد</h4>
            <p class="text-xs text-gray-400 font-bold">طالب مجتهد</p>
        </div>

        <div class="space-y-2 text-right">
            <a href="#" class="flex items-center gap-3 p-3 hover:bg-blue-50 rounded-xl transition text-blue-600 font-bold">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                الصفحة الرئيسية
            </a>
            <hr class="my-4 border-gray-100">
            
            <div class="space-y-1">
                <a href="#" class="flex items-center gap-3 p-3 hover:bg-gray-50 rounded-xl transition text-gray-600 text-sm font-bold">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    منتدى الطلبة
                </a>
                <a href="#" class="flex items-center gap-3 p-3 hover:bg-gray-50 rounded-xl transition text-gray-600 text-sm font-bold">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                    شحن كود سنتر
                </a>
                <a href="#" class="flex items-center gap-3 p-3 hover:bg-gray-50 rounded-xl transition text-gray-600 text-sm font-bold">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
                    نتائج اختبارات السنتر
                </a>
                <a href="#" class="flex items-center gap-3 p-3 hover:bg-gray-50 rounded-xl transition text-gray-600 text-sm font-bold">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
                    تفاصيل محاضراتي
                </a>
                <a href="#" class="flex items-center gap-3 p-3 hover:bg-gray-50 rounded-xl transition text-gray-600 text-sm font-bold">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    حسابي
                </a>
                <a href="#" class="flex items-center gap-3 p-3 hover:bg-gray-50 rounded-xl transition text-gray-600 text-sm font-bold">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M7 15h0M2 9.5h20"/></svg>
                    رصيدي
                </a>
                <a href="#" class="flex items-center gap-3 p-3 hover:bg-red-50 rounded-xl transition text-red-500 text-sm font-bold mt-8">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    تسجيل خروج
                </a>
            </div>
        </div>
    </div>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('hidden');
        }
    </script>

</body>
    </html>
