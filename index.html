function generateCode(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) { hash = (hash << 5) - hash + name.charCodeAt(i); hash |= 0; }
  return (Math.abs(hash) % 900000 + 100000).toString();
}

function ScheduleView({ DAYS_DATA, completed, toggleTask, expandedDay, setExpandedDay, setVideoModal }) {
  return h('div',{style:{animation:"fadeIn .4s ease"}},[
    h('h3',{key:'title',style:D.secTitle},[h(Icon,{key:'ic',name:"Calendar",size:16,color:"#f59e0b",style:{marginLeft:8}}),"جدول الـ 19 يوم"]),
    ...DAYS_DATA.map(day => {
      const done = day.tasks.filter(t=>completed[t.id]).length;
      const pct = Math.round((done/day.tasks.length)*100);
      const open = expandedDay===day.day;
      return h('div',{key:day.day,style:{marginBottom:10}},[
        h('button',{key:'hdr',style:{...SC.header,borderColor:day.color+"44"},onClick:()=>setExpandedDay(open?null:day.day)},[
          h('div',{key:'l',style:{display:"flex",alignItems:"center",gap:10}},[
            h('div',{key:'num',style:{...SC.num,background:day.color+"22",color:day.color}},day.day),
            h('div',{key:'info'},[
              h('div',{key:'t',style:{display:"flex",alignItems:"center",gap:6}},[
                h(SubjectIcon,{key:'ic',type:day.icon,color:day.color,size:14}),
                h('span',{key:'txt',style:{color:"#f1f5f9",fontWeight:700,fontSize:14}},`اليوم ${day.day} — ${day.subject}`),
              ]),
              h('div',{key:'s',style:{color:"#64748b",fontSize:12,marginTop:2}},`${done}/${day.tasks.length} مهام`),
            ]),
          ]),
          h('div',{key:'r',style:{display:"flex",alignItems:"center",gap:8}},[
            h('span',{key:'pct',style:{color:day.color,fontWeight:900,fontSize:14}},`${pct}%`),
            h(Icon,{key:'chv',name:open?"ChevronUp":"ChevronDown",size:15,color:"#64748b"}),
          ]),
        ]),
        h('div',{key:'bar',style:{height:3,background:"#1e293b",overflow:"hidden"}},
          h('div',{style:{height:"100%",width:`${pct}%`,background:day.color,transition:"width .4s"}})
        ),
        open && h('div',{key:'tasks',style:SC.tasks},
          day.tasks.map(t => h(TaskRow,{key:t.id,task:t,done:!!completed[t.id],color:day.color,onToggle:()=>toggleTask(t.id),onPlay:()=>setVideoModal(t)}))
        ),
      ]);
    }),
  ]);
}

  };
  const copyCode = (c) => {
    navigator.clipboard.writeText(c).then(() => { setCopied(true); setTimeout(()=>setCopied(false),2000); });
  };

  return h('div',{style:AP.bg},[
    h('div',{key:'hdr',style:AP.header},[
      h('div',{key:'l',style:{display:"flex",alignItems:"center",gap:12}},[
        h(Logo,{key:'logo',size:36}),
        h('div',{key:'tx'},[
          h('div',{key:'n',style:AP.platformName},"خطوة إلى الحلم"),
          h('div',{key:'b',style:AP.adminBadge},[h(Icon,{key:'ic',name:"Shield",size:11,color:"#6366f1",style:{marginLeft:4}}),"لوحة تحكم المسؤول"]),
        ]),
      ]),
      h('button',{key:'out',style:AP.logoutBtn,onClick:onLogout},[h(Icon,{key:'ic',name:"LogOut",size:15,color:"#64748b"}),h('span',{key:'t',style:{marginRight:6}},"خروج")]),
    ]),
    h('div',{key:'tabs',style:AP.tabs},[
      {id:"codes",label:"توليد الأكواد"},{id:"schedule",label:"جدول الأيام"},{id:"students",label:"قائمة الطلاب"},
    ].map(t=>h('button',{key:t.id,style:{...AP.tab,...(activeTab===t.id?AP.tabActive:{})},onClick:()=>setActiveTab(t.id)},t.label))),
    h('div',{key:'main',style:AP.main},[
      activeTab==="codes" && h('div',{key:'codes'},[
        h('h2',{key:'t',style:AP.secTitle},[h(Icon,{key:'ic',name:"Key",size:18,color:"#f59e0b",style:{marginLeft:8}}),"توليد كود من الاسم"]),
        h('div',{key:'sr',style:AP.searchRow},[
          h('input',{key:'i',style:AP.input,placeholder:"اكتب اسم الطالب...",value:searchName,onChange:e=>setSearchName(e.target.value),onKeyDown:e=>e.key==="Enter"&&doSearch()}),
          h('button',{key:'b',style:AP.searchBtn,onClick:doSearch},"توليد الكود"),
        ]),
        result && h('div',{key:'res',style:AP.resultCard},[
          h('div',{key:'n',style:AP.resultName},[h(Icon,{key:'ic',name:"Users",size:16,color:"#f59e0b",style:{marginLeft:8}}),result.name]),
          h('div',{key:'r',style:AP.resultRow},[
            h('span',{key:'c',style:AP.codeDisplay},result.code),
            h('button',{key:'cp',style:AP.copyBtn,onClick:()=>copyCode(result.code)},[
              h(Icon,{key:'ic',name:copied?"Check":"Copy",size:15,color:copied?"#10b981":"#94a3b8"}),
              h('span',{key:'t',style:{marginRight:6,fontSize:13}},copied?"تم النسخ!":"نسخ"),
            ]),
          ]),
        ]),
        h('div',{key:'info',style:AP.infoBox},[
          h(Icon,{key:'ic',name:"Shield",size:14,color:"#6366f1",style:{marginLeft:8,flexShrink:0}}),
          h('span',{key:'t',style:{color:"#94a3b8",fontSize:13,lineHeight:1.7}},"الكود يُولَّد من الاسم بخوارزمية ثابتة — نفس الاسم دائماً = نفس الكود"),
        ]),
      ]),
      activeTab==="schedule" && h('div',{key:'sched'},[
        h('h2',{key:'t',style:AP.secTitle},[h(Icon,{key:'ic',name:"Calendar",size:18,color:"#f59e0b",style:{marginLeft:8}}),"جدول الـ 19 يوم"]),
        h('div',{key:'g',style:AP.schedGrid},
          DAYS_DATA.map(d=>h('div',{key:d.day,style:{...AP.dayCard,borderColor:d.color+"44"}},[
            h('div',{key:'hdr',style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}},[
              h('div',{key:'l',style:{display:"flex",alignItems:"center",gap:6}},[
                h('div',{key:'num',style:{...AP.dayNum,background:d.color+"22",color:d.color}},d.day),
                h(SubjectIcon,{key:'ic',type:d.icon,color:d.color,size:13}),
                h('span',{key:'n',style:{color:"#e2e8f0",fontWeight:700,fontSize:12}},d.subject),
              ]),
              h('span',{key:'cnt',style:{color:"#64748b",fontSize:11}},`${d.tasks.length} مهام`),
            ]),
            ...d.tasks.map(t=>h('div',{key:t.id,style:AP.taskRow},[
              h('span',{key:'t',style:{color:"#94a3b8",fontSize:11}},t.title),
              h('span',{key:'tc',style:{color:"#475569",fontSize:10}},t.teacher),
            ])),
          ]))
        ),
      ]),
      activeTab==="students" && h('div',{key:'stud'},[
        h('h2',{key:'t',style:AP.secTitle},[h(Icon,{key:'ic',name:"Users",size:18,color:"#f59e0b",style:{marginLeft:8}}),"قائمة الطلاب المسجلين"]),
        h('div',{key:'tbl',style:{background:"#1e293b",border:"1px solid #334155",borderRadius:14,overflow:"hidden"}},[
          h('div',{key:'th',style:AP.tableHead},[h('span',{key:'n'},"الاسم"),h('span',{key:'c',style:{direction:"ltr"}},"الكود")]),
          ...Object.entries(STUDENTS).map(([c,n])=>h('div',{key:c,style:AP.tableRow},[
            h('span',{key:'n',style:{color:"#e2e8f0",fontWeight:600}},n),
            h('div',{key:'r',style:{display:"flex",alignItems:"center",gap:8}},[
              h('span',{key:'c',style:{color:"#f59e0b",fontWeight:800,direction:"ltr",letterSpacing:3}},c),
              h('button',{key:'cp',style:AP.miniCopy,onClick:()=>copyCode(c)},h(Icon,{name:"Copy",size:12,color:"#64748b"})),
            ]),
          ])),
        ]),
        h('p',{key:'hint',style:{color:"#475569",fontSize:12,marginTop:10,textAlign:"center"}},"لإضافة طالب: أضف الكود والاسم في مصفوفة STUDENTS بالكود"),
      ]),
    ]),
  ]);
}

// ══════════════════════════════════════════════
//  LOGIN SCREEN
// ══════════════════════════════════════════════
function LoginScreen({ onLogin }) {
  const [code, setCode] = useState("");
  const [error, setError] = useState(false);
  const [shake, setShake] = useState(false);

  const tryLogin = () => {
    const ok = onLogin(code.trim());
    if (!ok) { setError(true); setShake(true); setTimeout(()=>setShake(false),500); }
  };

  return h('div',{style:LS.bg},[
    ...[...Array(70)].map((_,i)=>h('div',{key:i,style:{position:"absolute",width:(Math.sin(i*7+1)*1.5+1)+"px",height:(Math.sin(i*7+1)*1.5+1)+"px",borderRadius:"50%",background:"white",left:(i*137.5%100)+"%",top:(i*97.3%100)+"%",opacity:0.15,animation:`twinkle ${2+(i%4)}s ease-in-out infinite`,animationDelay:(i*0.07)+"s"}})),
    h('div',{key:'glow1',style:{position:"absolute",top:"12%",right:"8%",width:280,height:280,background:"radial-gradient(circle,rgba(99,102,241,.16),transparent 70%)",borderRadius:"50%",pointerEvents:"none"}}),
    h('div',{key:'glow2',style:{position:"absolute",bottom:"18%",left:"4%",width:220,height:220,background:"radial-gradient(circle,rgba(245,158,11,.1),transparent 70%)",borderRadius:"50%",pointerEvents:"none"}}),
    h('div',{key:'card',style:{...LS.card,animation:shake?"shake .4s ease":"fadeUp .6s ease"}},[
      h('div',{key:'top',style:{textAlign:"center",marginBottom:26}},[
        h('div',{key:'ring',style:{display:"flex",justifyContent:"center",marginBottom:14}},h('div',{style:LS.logoRing},h(Logo,{size:60}))),
        h('h1',{key:'t',style:LS.title},"خطوة إلى الحلم"),
        h('p',{key:'s',style:LS.sub},"منصتك الأسطورية نحو قمة الثانوية"),
      ]),
      h('div',{key:'verse',style:LS.verse},h('span',{style:LS.verseText},"❝ وَأَن لَّيْسَ لِلْإِنسَانِ إِلَّا مَا سَعَىٰ ❞")),
      h('label',{key:'lbl',style:LS.label},[h(Icon,{key:'ic',name:"Key",size:14,color:"#6366f1",style:{marginLeft:7}}),"أدخل كودك السري (6 أرقام)"]),
      h('div',{key:'boxes',style:{...LS.codeBoxes,position:"relative"}},[
        ...[...Array(6)].map((_,i)=>h('div',{key:i,style:{...LS.box,...(code[i]?LS.boxFilled:{})}},code[i]||"")),
        h('input',{key:'inp',style:LS.hiddenInput,type:"text",inputMode:"numeric",maxLength:6,value:code,onChange:e=>{setCode(e.target.value.replace(/\D/g,""));setError(false);},onKeyDown:e=>e.key==="Enter"&&tryLogin(),autoFocus:true}),
      ]),
      error && h('div',{key:'err',style:LS.errMsg},[h(Icon,{key:'ic',name:"AlertCircle",size:13,color:"#ef4444",style:{marginLeft:5}}),"الكود غير صحيح — تواصل مع المسؤول"]),
      h('button',{key:'btn',style:{...LS.btn,opacity:code.length===6?1:0.45,marginTop:16},onClick:tryLogin,disabled:code.length!==6},[
        h(Icon,{key:'ic',name:"Zap",size:17,color:"white"}),h('span',{key:'t',style:{marginRight:8}},"دخول")
      ]),
      h('p',{key:'hint',style:LS.hint},"لا تملك كوداً؟ تواصل مع الأستاذ المسؤول"),
    ]),
  ]);
}

// ══════════════════════════════════════════════
//  MAIN APP
// ══════════════════════════════════════════════
function App() {
  const [screen, setScreen] = useState("login");
  const [isAdmin, setIsAdmin] = useState(false);
  const [studentName, setStudentName] = useState("");
  const [studentCode, setStudentCode] = useState("");
  const [completed, setCompleted] = useState({});
  const [expandedDay, setExpandedDay] = useState(null);
  const [videoModal, setVideoModal] = useState(null);
  const [verseIdx, setVerseIdx] = useState(0);
  const [activeTab, setActiveTab] = useState("dashboard");

  useEffect(() => {
    try {
      const code = localStorage.getItem("katwa_code");
      const comp = localStorage.getItem("katwa_completed");
      if (comp) setCompleted(JSON.parse(comp));
      if (code === ADMIN_CODE) { setIsAdmin(true); setScreen("app"); }
      else if (code && STUDENTS[code]) { setStudentCode(code); setStudentName(STUDENTS[code]); setScreen("app"); }
    } catch(e){}
  }, []);

  useEffect(() => {
    const iv = setInterval(()=>setVerseIdx(v=>(v+1)%QURAN_VERSES.length),4500);
    return ()=>clearInterval(iv);
  }, []);

  const handleLogin = (code) => {
    if (code === ADMIN_CODE) { setIsAdmin(true); localStorage.setItem("katwa_code",code); setScreen("app"); return true; }
    if (STUDENTS[code]) { setStudentCode(code); setStudentName(STUDENTS[code]); localStorage.setItem("katwa_code",code); setScreen("app"); return true; }
    return false;
  };

  const handleLogout = () => {
    localStorage.removeItem("katwa_code");
    setIsAdmin(false); setStudentCode(""); setStudentName(""); setScreen("login"); setActiveTab("dashboard");
  };

  const toggleTask = (id) => {
    const next = {...completed,[id]:!completed[id]};
    setCompleted(next);
    try { localStorage.setItem("katwa_completed",JSON.stringify(next)); } catch(e){}
  };

  if (screen==="login") return h(LoginScreen,{onLogin:handleLogin});
  if (isAdmin) return h(AdminPanel,{onLogout:handleLogout});

  const completedCount = Object.values(completed).filter(Boolean).length;
  const progress = Math.round((completedCount/TOTAL_TASKS)*100);
  const todayDayNum = (new Date().getDate()%19)||1;
  const todayData = DAYS_DATA.find(d=>d.day===todayDayNum)||DAYS_DATA[0];

  return h('div',{style:S.app},[
    h('div',{key:'ticker',style:S.ticker},h('span',{style:S.tickerText},`✦ ${QURAN_VERSES[verseIdx]} ✦`)),
    h('header',{key:'hdr',style:S.header},[
      h('div',{key:'l',style:{display:"flex",alignItems:"center",gap:12}},[
        h(Logo,{key:'logo',size:38}),
        h('div',{key:'tx'},[
          h('div',{key:'n',style:S.platformName},"خطوة إلى الحلم"),
          h('div',{key:'hl',style:S.heroLine},[
            h(Icon,{key:'ic',name:"Sparkles",size:12,color:"#f59e0b",style:{marginLeft:4}}),
            "البطل:\u00a0",
            h('span',{key:'nm',style:{color:"#f59e0b"},className:"glow-name"},studentName),
          ]),
        ]),
      ]),
      h('div',{key:'r',style:{display:"flex",alignItems:"center",gap:8}},[
        h('div',{key:'pill',style:S.codePill},[h(Icon,{key:'ic',name:"Lock",size:11,color:"#6366f1"}),h('span',{key:'c',style:{direction:"ltr",letterSpacing:3,fontWeight:800}},studentCode)]),
        h('button',{key:'out',style:S.iconBtn,onClick:handleLogout},h(Icon,{name:"LogOut",size:17,color:"#64748b"})),
      ]),
    ]),
    h('div',{key:'gp',style:S.gpWrap},[
      h('div',{key:'t',style:S.gpTrack},h('div',{style:{...S.gpFill,width:`${progress}%`}})),
      h('span',{key:'l',style:S.gpLabel},`${progress}% · ${completedCount}/${TOTAL_TASKS} مهمة مكتملة`),
    ]),
    h('nav',{key:'nav',style:S.nav},[
      {id:"dashboard",label:"الرئيسية",icon:"BarChart3"},
      {id:"schedule",label:"الجدول",icon:"Calendar"},
      {id:"today",label:"نشاطي اليوم",icon:"Target"},
    ].map(t=>h('button',{key:t.id,style:{...S.navBtn,...(activeTab===t.id?S.navActive:{})},onClick:()=>setActiveTab(t.id)},[
      h(Icon,{key:'ic',name:t.icon,size:15,color:activeTab===t.id?"white":"#94a3b8"}),
      h('span',{key:'l',style:{marginRight:6}},t.label),
    ]))),
    h('main',{key:'main',style:S.main},[
      activeTab==="dashboard" && h(DashboardView,{key:'dash',studentName,progress,completedCount,todayData,completed,DAYS_DATA,onGoToday:()=>setActiveTab("today")}),
      activeTab==="schedule" && h(ScheduleView,{key:'sched',DAYS_DATA,completed,toggleTask,expandedDay,setExpandedDay,setVideoModal}),
      activeTab==="today" && h(TodayView,{key:'today',todayData,completed,toggleTask,setVideoModal}),
    ]),
    videoModal && h('div',{key:'overlay',style:S.overlay,onClick:()=>setVideoModal(null)},
      h('div',{style:S.modal,onClick:e=>e.stopPropagation()},[
        h('div',{key:'mt',style:S.modalTop},[
          h('span',{key:'t',style:S.modalTitle},`${videoModal.title} — ${videoModal.teacher}`),
          h('button',{key:'x',style:S.closeBtn,onClick:()=>setVideoModal(null)},h(Icon,{name:"X",size:19,color:"#e2e8f0"})),
        ]),
        h('div',{key:'iw',style:S.iframeWrap},
          h('iframe',{src:`https://www.youtube.com/embed/${videoModal.videoId}?autoplay=1&rel=0`,style:S.iframe,allowFullScreen:true,allow:"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture",title:videoModal.title})
        ),
      ])
    ),
  ]);
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,{}));
</script>
</body>
</html>
