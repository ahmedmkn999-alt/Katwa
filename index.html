<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية SUPER MISS - الأسطورة بدأت</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'neo-blue': '#1D4ED8',
                        'neo-yellow': '#FACC15',
                        'neo-black': '#000000',
                    },
                    boxShadow: {
                        'neo': '5px 5px 0px 0px rgba(0,0,0,1)',
                        'neo-hover': '8px 8px 0px 0px rgba(0,0,0,1)',
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Cairo', sans-serif; cursor: crosshair; }
        .hero-fly {
            background-image: url('https://i.postimg.cc/1RkTjFzN/1778213993401.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(3deg); }
        }
        .dark .hero-fly { filter: brightness(0.8) contrast(1.2); }
    </style>
</head>
<body class="bg-[#F8FAFC] dark:bg-neo-black text-neo-black dark:text-white transition-colors duration-300">

    <nav class="bg-white dark:bg-zinc-900 border-b-4 border-neo-black sticky top-0 z-50 px-6 py-4 flex items-center justify-between shadow-neo">
        <div class="flex items-center gap-6">
            <button onclick="toggleDarkMode()" class="bg-neo-yellow border-2 border-neo-black p-2 rounded-full shadow-neo transition-all active:translate-x-1 active:translate-y-1 active:shadow-none">
                <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
                </svg>
                <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                </svg>
            </button>
            <div class="text-3xl font-black text-neo-blue dark:text-white tracking-tighter border-r-4 border-neo-black pr-4">SUPER MISS</div>
        </div>

        <div class="flex items-center gap-5">
            <div class="bg-neo-black text-white dark:bg-white dark:text-neo-black border-2 border-neo-black px-5 py-2.5 rounded-full flex items-center gap-3 font-bold text-sm shadow-neo">
                <span>0 جنيه</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" />
                </svg>
            </div>
            <div class="w-14 h-14 rounded-full border-4 border-neo-black overflow-hidden shadow-neo">
                <img src="https://ui-avatars.com/api/?name=Hero+Student&background=random" alt="User">
            </div>
        </div>
    </nav>

    <header class="max-w-7xl mx-auto px-6 py-20 md:py-32 grid grid-cols-1 md:grid-cols-2 gap-16 items-center">
        <div class="text-right">
            <span class="inline-block bg-neo-yellow text-neo-black border-2 border-neo-black px-6 py-1.5 rounded-full font-black text-sm mb-6 shadow-neo">أكاديمية السوبر في اللغة العربية</span>
            <h1 class="text-6xl md:text-8xl font-black text-neo-black dark:text-white mb-6 leading-tight tracking-tighter">تصفح<br>الكورسات</h1>
            <p class="text-lg text-gray-700 dark:text-zinc-300 font-medium max-w-lg mb-10 leading-relaxed">استعد للقمة مع أقوى نظام تعليمي شامل. هنا نبدأ الرحلة نحو الدرجة النهائية في اللغة العربية مع SUPER MISS.</p>
            <button class="bg-neo-blue text-white border-4 border-neo-black px-12 py-5 rounded-2xl font-black text-xl shadow-neo transition-all hover:translate-x-1 hover:translate-y-1 hover:shadow-none active:bg-blue-800">ابدأ رحلتك الآن</button>
        </div>
        <div class="h-[500px] hero-fly"></div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-20 border-t-4 border-neo-black">
        <h2 class="text-4xl font-black mb-16 border-r-8 border-neo-yellow pr-5">المناهج والشهور</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            <script>
                const courses = [
                    { name: "كورس الشهر الأول", price: 100 },
                    { name: "كورس الشهر الثاني", price: 100 },
                    { name: "كورس الشهر الثالث", price: 100 },
                    { name: "كورس الشهر الرابع", price: 100 },
                    { name: "كورس الشهر الخامس", price: 100 },
                    { name: "كورس الشهر السادس", price: 100 },
                    { name: "كورس الشهر السابع", price: 100 },
                    { name: "كورس الشهر الثامن", price: 100 },
                    { name: "المراجعة النهائية الشاملة", price: 100 },
                ];

                courses.forEach((course, i) => {
                    const isFinal = i === 8;
                    const cardColors = isFinal ? "bg-red-100 dark:bg-red-950 border-red-500" : "bg-white dark:bg-zinc-900 border-neo-black";
                    const textColors = isFinal ? "text-red-900 dark:text-red-200" : "text-neo-black dark:text-white";

                    document.write(`
                        <div class="border-4 rounded-3xl p-8 shadow-neo transition-all hover:shadow-neo-hover ${cardColors}">
                            <div class="flex justify-between items-center mb-6">
                                <div class="bg-neo-yellow text-neo-black border-2 border-neo-black px-4 py-1 rounded-full font-black text-xs shadow-neo">${course.price} ج.م</div>
                                <span class="text-xs font-black text-gray-500 dark:text-zinc-400">تالتة ثانوي</span>
                            </div>
                            <h3 class="text-2xl font-black mb-4 ${textColors}">${course.name}</h3>
                            <p class="text-gray-600 dark:text-zinc-400 text-sm mb-8 leading-relaxed">يتضمن الكورس 4 محاضرات أسبوعية، اختبارات إلكترونية مكثفة، وملازم PDF مجهزة لأعلى الدرجات.</p>
                            <button class="w-full ${isFinal ? 'bg-neo-black' : 'bg-neo-blue'} text-white border-2 border-neo-black py-4 rounded-2xl font-black tracking-wide text-lg shadow-neo transition-all hover:scale-105">دخول الكورس</button>
                        </div>
                    `);
                });
            </script>
        </div>
    </main>

    <script>
        function toggleDarkMode() {
            const body = document.documentElement;
            const sunIcon = document.getElementById('sun-icon');
            const moonIcon = document.getElementById('moon-icon');
            
            body.classList.toggle('dark');
            
            if (body.classList.contains('dark')) {
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            } else {
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
